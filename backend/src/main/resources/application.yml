spring:
  application:
    name: pulapay
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pulapay}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
  seed:
    local-admin:
      enabled: ${LOCAL_ADMIN_SEED_ENABLED:false}
